version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 10
    groups:
      nextjs:
        patterns:
          - "next"
          - "next-*"
          - "eslint-config-next"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      liveblocks:
        patterns:
          - "@liveblocks/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
      drizzle:
        patterns:
          - "drizzle-orm"
          - "drizzle-kit"
          - "@auth/drizzle-adapter"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
    ignore:
      - dependency-name: "next-auth"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"
    schedule:
      interval: "weekly"
      day: "monday"
