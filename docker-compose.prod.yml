services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - POSTGRES_URL=postgresql://kllapp:kllapp@db:5432/kllapp
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kllapp
      POSTGRES_USER: kllapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kllapp}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kllapp"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
